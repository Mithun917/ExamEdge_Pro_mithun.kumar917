<!-- components/navbar.html -->
<nav class="navbar" role="navigation" aria-label="Main navigation">

  <!-- Mobile: hamburger -->
  <button class="btn btn-ghost btn-icon" data-action="toggle-sidebar" aria-label="Toggle sidebar" style="display:none" id="mobile-menu-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <!-- Brand -->
  <a class="navbar__brand" href="#dashboard" aria-label="ExamEdge Pro Home">
    <div class="navbar__brand-icon" aria-hidden="true">⚡</div>
    <span>ExamEdge <span class="text-accent">Pro</span></span>
  </a>

  <!-- Search -->
  <div class="navbar__center">
    <div class="navbar__search">
      <svg class="navbar__search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        type="search"
        class="navbar__search-input"
        placeholder="Search questions, topics…"
        aria-label="Search questions and topics"
        id="global-search"
      />
    </div>
  </div>

  <!-- Right side -->
  <div class="navbar__end">

    <!-- XP Badge -->
    <div class="navbar__xp-badge" id="navbar-xp" title="Your XP">
      <span>⚡</span>
      <span id="navbar-xp-value">—</span>
    </div>

    <!-- Streak -->
    <div class="navbar__xp-badge" id="navbar-streak" title="Study streak" style="color: var(--clr-accent-3)">
      <span>🔥</span>
      <span id="navbar-streak-value">0</span>
    </div>

    <!-- Theme toggle -->
    <button class="btn btn-ghost btn-icon" data-action="toggle-theme" aria-label="Toggle theme" title="Toggle dark/light theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
      </svg>
    </button>

    <!-- Notifications -->
    <button class="btn btn-ghost btn-icon" aria-label="Notifications" id="notifications-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </button>

    <!-- Avatar / profile -->
    <a href="#profile" aria-label="View profile">
      <div class="avatar avatar-sm" id="navbar-avatar" aria-hidden="true">A</div>
    </a>

  </div>
</nav>

<script type="module">
  import { state }       from '../js/state.js';
  import { formatXP }    from '../js/utils.js';
  import { getUserInitials } from '../js/modules/user.js';

  function updateNavbar() {
    const xpEl      = document.getElementById('navbar-xp-value');
    const streakEl  = document.getElementById('navbar-streak-value');
    const avatarEl  = document.getElementById('navbar-avatar');
    const menuBtn   = document.getElementById('mobile-menu-btn');

    if (xpEl)     xpEl.textContent     = formatXP(state.get('xp'));
    if (streakEl) streakEl.textContent = state.get('streak') ?? 0;
    if (avatarEl) avatarEl.textContent = getUserInitials();
    if (menuBtn)  menuBtn.style.display = window.innerWidth <= 768 ? 'flex' : 'none';
  }

  state.subscribe('xp',     updateNavbar);
  state.subscribe('streak', updateNavbar);
  state.subscribe('user',   updateNavbar);
  updateNavbar();

  window.addEventListener('resize', updateNavbar);
</script>
