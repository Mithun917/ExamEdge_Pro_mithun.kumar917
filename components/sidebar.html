<script type="module">
  import { state }        from '../js/state.js';
  import { getLevelProgress } from '../js/modules/xp.js';

  function updateSidebarXP() {
    const { level, progress, current, ceil } = getLevelProgress();
    const levelEl  = document.getElementById('sidebar-level');
    const pointsEl = document.getElementById('sidebar-xp-points');
    const barEl    = document.getElementById('sidebar-xp-bar');

    if (levelEl)  levelEl.textContent  = `Lv. ${level}`;
    if (pointsEl) pointsEl.textContent = `${current} XP`;
    if (barEl)    barEl.style.width    = `${Math.round(progress * 100)}%`;
  }

  state.subscribe('xp',    updateSidebarXP);
  state.subscribe('level', updateSidebarXP);
  updateSidebarXP();
</script>
